<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Visitante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0" th:text="${visitante.idVisitante == null} ? '👤 Registrar Nuevo Visitante' : '✏️ Modificar Visitante'"></h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form th:action="@{/visitantes/guardar}" th:object="${visitante}" method="post">
                            
                            <input type="hidden" th:field="*{idVisitante}" />

                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre *</label>
                                <input type="text" th:field="*{nombre}" class="form-control" required maxlength="50" placeholder="Ej: Juan"/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Apellido *</label>
                                <input type="text" th:field="*{apellido}" class="form-control" required maxlength="50" placeholder="Ej: Pérez"/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Correo Electrónico</label>
                                <input type="email" th:field="*{email}" class="form-control" maxlength="100" placeholder="nombre@correo.com"/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Dirección Residencial</label>
                                <input type="text" th:field="*{direccion}" class="form-control" maxlength="100" placeholder="Ej: Av. De Mayo 123"/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Teléfono de Contacto</label>
                                <input type="text" th:field="*{telefono}" class="form-control" maxlength="20" placeholder="Ej: 1144445555"/>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a th:href="@{/visitantes}" class="btn btn-secondary fw-bold">Cancelar</a>
                                <button type="submit" class="btn btn-primary fw-bold">Guardar Registro</button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
